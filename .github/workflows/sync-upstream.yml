name: Sync Upstream

# Автосинхронизация форка consiliumaxis/elizabethvane с upstream
# Elizabet-Eric-project/elizabethvane. Ветки main и test держатся ТОЧНЫМИ
# зеркалами upstream. Свой workflow-файл живёт только в ветке ci/sync.
# Своя разработка — в feature/*.
#
# НАДЁЖНОСТЬ:
# GitHub-cron для коротких интервалов часто задерживается или пропускает
# запуски. Поэтому:
#   1) cron стоит на каждые 5 минут (минимальный практичный интервал);
#   2) КАЖДЫЙ прогон внутри себя делает несколько проходов синка с паузами
#      (см. PASSES/PASS_INTERVAL) — так один запуск покрывает ~25 минут и
#      подхватывает новые коммиты upstream, даже если следующий cron задержится.
#
# ЗАЩИТА / ОТКАТ:
# Перед КАЖДЫМ обновлением ветки (если в upstream реально появились новые
# коммиты) ставится тег-снимок предыдущего состояния:
#   snapshot/main/<UTC-timestamp>  и  snapshot/test/<UTC-timestamp>
# Хранятся последние KEEP_SNAPSHOTS снимков на ветку, старые удаляются.
# Инструкция по откату — docs/ROLLBACK.md.
#
# Upstream публичный -> отдельный токен не нужен: читаем upstream без авторизации,
# пишем в форк через встроенный GITHUB_TOKEN.

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

# Не запускать несколько прогонов одновременно.
concurrency:
  group: sync-upstream
  cancel-in-progress: false

env:
  KEEP_SNAPSHOTS: '50'   # сколько тегов-снимков хранить на ветку
  PASSES: '5'            # сколько проходов синка за один прогон
  PASS_INTERVAL: '300'   # пауза между проходами, секунд (5 минут)

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork (full history + tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Mirror main and test from upstream (multi-pass + auto-snapshot)
        env:
          UPSTREAM: https://github.com/Elizabet-Eric-project/elizabethvane.git
        run: |
          set -euo pipefail
          git config user.name  "GH Action - Upstream Sync"
          git config user.email "action@github.com"
          git remote add upstream "$UPSTREAM"

          sync_once () {
            git fetch upstream --prune
            git fetch origin --tags --prune
            TS="$(date -u +'%Y-%m-%d-%H%M%S')"
            for BRANCH in main test; do
              echo "::group::[$1] Mirroring $BRANCH"
              if ! git ls-remote --exit-code --heads upstream "$BRANCH" >/dev/null 2>&1; then
                echo "Upstream has no branch '$BRANCH', skipping."; echo "::endgroup::"; continue
              fi
              UPSTREAM_SHA="$(git rev-parse "upstream/$BRANCH")"
              if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
                FORK_SHA="$(git rev-parse "origin/$BRANCH")"
              else
                FORK_SHA=""
              fi
              if [ "$FORK_SHA" = "$UPSTREAM_SHA" ]; then
                echo "Branch '$BRANCH' already matches upstream ($UPSTREAM_SHA)."; echo "::endgroup::"; continue
              fi
              if [ -n "$FORK_SHA" ]; then
                SNAP="snapshot/$BRANCH/$TS"
                echo "Creating backup snapshot tag '$SNAP' at $FORK_SHA"
                git tag -f "$SNAP" "$FORK_SHA"
                git push origin "refs/tags/$SNAP" --force
              fi
              git checkout -B "$BRANCH" "upstream/$BRANCH"
              git push origin "$BRANCH" --force-with-lease
              echo "Synced $BRANCH to upstream/$BRANCH ($UPSTREAM_SHA)"
              echo "::endgroup::"
            done
          }

          i=1
          while [ "$i" -le "${PASSES}" ]; do
            echo "===== PASS $i / ${PASSES} ====="
            sync_once "pass$i"
            if [ "$i" -lt "${PASSES}" ]; then
              echo "Sleeping ${PASS_INTERVAL}s before next pass..."
              sleep "${PASS_INTERVAL}"
            fi
            i=$((i+1))
          done

      - name: Prune old snapshot tags
        run: |
          set -euo pipefail
          git fetch origin --tags --prune
          for BRANCH in main test; do
            MAPFILE="$(git tag -l "snapshot/$BRANCH/*" | sort -r)"
            [ -z "$MAPFILE" ] && continue
            COUNT=0
            while IFS= read -r TAG; do
              [ -z "$TAG" ] && continue
              COUNT=$((COUNT+1))
              if [ "$COUNT" -gt "${KEEP_SNAPSHOTS}" ]; then
                echo "Pruning old snapshot tag '$TAG'"
                git push origin ":refs/tags/$TAG" || true
              fi
            done <<< "$MAPFILE"
          done
